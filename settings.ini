# 外部程序和资源所在目录。
[paths]
# 可执行文件目录，通常包含 mpv.exe、yt-dlp.exe 等。
bin_dir = bin

[app]
# 本地音乐库根目录。
music_dir = Z:
# 扫描本地音乐时允许的文件扩展名，使用逗号分隔。
allowed_extensions = .mp3,.wav,.flac,.aac,.m4a
# 服务监听地址，0.0.0.0 表示允许局域网访问。
server_host = 0.0.0.0
# Web 服务端口。
server_port = 9000
# 是否开启调试模式。
debug = true
# MPV 启动命令，包含 IPC 管道、音频输出和设备设置。
mpv_cmd = "D:\Code\ClubMusic\bin\mpv.exe" --input-ipc-server=\\.\pipe\mpv-pipe --idle=yes --force-window=no --no-video --ao=wasapi --audio-device=wasapi/{0265296d-bf77-498f-aba8-f5843ea8c561}
# 本地搜索最多返回多少条结果。
local_search_max_results = 200
# YouTube 搜索最多返回多少条结果。
youtube_search_max_results = 200
# 解析 YouTube 链接时，额外允许展开的最大条目数。
youtube_url_extra_max = 500
# 默认本地播放音量，范围通常为 0-100。
local_volume = 80
# 启动阶段等待播放器初始化的超时时间，单位秒。
startup_timeout = 10
# 播放历史最大保留条数。
playback_history_max = 9999

[logging]
# 日志级别，例如 DEBUG、INFO、WARNING。
level = INFO
# 状态轮询采样间隔，单位秒。
polling_sample_rate = 0.1
# 这些路径的请求会被日志过滤，使用逗号分隔。
filtered_paths = /status,/volume
# 心跳日志输出间隔，单位秒。
heartbeat_log_interval = 10
# 日志目录。
log_dir = logs
# 日志保留天数。
log_keep_days = 7

[ui]
# 是否显示 YouTube 播放控制相关界面。
youtube_controls = true
# 是否显示展开按钮。
expand_button = true

[cache]
# 是否启用 URL 缓存。
url_cache_enabled = true

[backup]
# 是否启用自动备份。
enabled = true
# 备份文件保存目录。
backup_dir = backups
# 自动备份间隔，单位小时。
interval_hours = 6
# 备份保留天数。
keep_days = 7

[auto_fill]
# 是否启用自动补歌功能。
enabled = true
# 是否从现有播放列表中补充歌曲。
source_playlists = true
# 是否从播放历史中补充歌曲。
source_history = false
# 是否从本地音乐库中补充歌曲。
source_local = true

[room]
# 最多允许创建的房间数量。
max_rooms = 10
# 房间空闲超时，单位秒。
idle_timeout = 3600

