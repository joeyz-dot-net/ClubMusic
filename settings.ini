# ClubMusic 配置文件。
# 大多数配置修改后需要重启应用生效；界面设置项会在运行时自动写回此文件。

# 外部工具与资源路径配置。
[paths]
# 外部工具目录，支持相对路径或绝对路径。
bin_dir = bin

# 应用运行配置。
[app]
# 本地音乐库根目录。
music_dir = Z:
# 允许扫描的音频扩展名列表，使用逗号分隔。
allowed_extensions = .mp3,.wav,.flac,.aac,.m4a
# 服务监听地址。
server_host = 0.0.0.0
# 服务监听端口。
server_port = 9000
# 是否启用调试模式。
debug = true
# MPV 启动命令，包含 IPC 管道和音频输出参数。
mpv_cmd = "D:\Code\ClubMusic\bin\mpv.exe" --input-ipc-server=\\.\pipe\mpv-pipe --idle=yes --force-window=no --no-video --ao=wasapi --audio-device=wasapi/{0265296d-bf77-498f-aba8-f5843ea8c561}
# 本地搜索单次返回的最大结果数。
local_search_max_results = 200
# YouTube 搜索单次返回的最大结果数。
youtube_search_max_results = 200
# YouTube URL 解析时允许补充缓存的结果上限。
youtube_url_extra_max = 500
# 默认本地播放音量，范围 0 到 100。
local_volume = 80
# 启动时音频设备选择的超时时间，单位秒。
startup_timeout = 10
# 播放历史保留的最大条数。
playback_history_max = 9999

# 日志输出配置。
[logging]
# 日志级别，可选 DEBUG、INFO、WARNING、ERROR、CRITICAL。
level = INFO
# 高频轮询接口的日志采样率，范围 0.0 到 1.0。
polling_sample_rate = 0.1
# 按采样规则处理的高频请求路径，使用逗号分隔。
filtered_paths = /status,/volume
# 心跳日志输出间隔，单位秒。
heartbeat_log_interval = 10
# 日志目录；留空时不写入日志文件。
log_dir = logs
# 日志文件保留天数。
log_keep_days = 7

# 界面开关配置。
[ui]
# 是否显示 YouTube 原生控件。
youtube_controls = false
# 是否显示自定义放大按钮。
expand_button = true
# 是否在底部导航栏显示 Settings 按钮。
settings_nav_visible = false
# 默认启动显示的页面，可选 playlists 或 albums。
default_page = albums

# 缓存配置。
[cache]
# 是否启用 YouTube 直链缓存。
url_cache_enabled = true

# 定时备份配置。
[backup]
# 是否启用定时备份。
enabled = true
# 备份目录，支持相对路径或绝对路径。
backup_dir = backups
# 备份间隔，单位小时，可使用小数。
interval_hours = 6
# 备份保留天数。
keep_days = 7

# 空闲自动填充队列配置。
[auto_fill]
# 是否启用空闲自动填充。
enabled = true
# 是否从歌单中抽取候选歌曲。
source_playlists = true
# 是否从播放历史中抽取候选歌曲。
source_history = false
# 是否从本地文件树中抽取候选歌曲。
source_local = true

# 多房间播放配置。
[room]
# 允许同时存在的房间数量上限。
max_rooms = 10
# 房间空闲超时时间，单位秒。
idle_timeout = 3600
