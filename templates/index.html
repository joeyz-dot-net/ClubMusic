	<!-- 禁止缩放脚本 -->
	<script>
		// 禁止 Safari 双指放大
		document.addEventListener('gesturestart', function(e) {
			e.preventDefault();
		});
		
		// 禁止 touchmove 双指放大
		let lastTouchDistance = 0;
		document.addEventListener('touchmove', function(e) {
			if (e.touches.length === 2) {
				e.preventDefault();
			}
		}, { passive: false });
		
		// 禁止双击放大
		let lastTapTime = 0;
		document.addEventListener('touchend', function(e) {
			const currentTime = new Date().getTime();
			const tapLength = currentTime - lastTapTime;
			if (tapLength < 300 && tapLength > 0) {
				e.preventDefault();
			}
			lastTapTime = currentTime;
		}, { passive: false });
	</script>

<script>
	// Safari Storage Access API - 请求存储权限（修复Tracking Prevention）
	async function requestStorageAccess() {
		if (!document.hasStorageAccess) {
			return true; // 不支持Storage Access API的浏览器直接返回
		}
		
		try {
			const hasAccess = await document.hasStorageAccess();
			if (!hasAccess) {
				console.log('[Safari] 检测到Tracking Prevention，请求存储权限...');
				await document.requestStorageAccess();
				console.log('[Safari] ✅ 存储权限已获取');
			}
			return true;
		} catch (err) {
			console.warn('[Safari] ⚠️ 无法获取存储权限（需要用户交互）:', err.message);
			return false;
		}
	}
	
	// 用户首次交互时请求存储权限（Safari要求用户手势）
	document.addEventListener('click', async function handleFirstClick() {
		await requestStorageAccess();
		document.removeEventListener('click', handleFirstClick);
	}, { once: true });
</script>
